[phases.setup]
nixPkgs = [
    "php84",
    "php84Extensions.pdo",
    "php84Extensions.pdo_mysql",
    "php84Extensions.mbstring",
    "php84Extensions.xml",
    "php84Extensions.curl",
    "php84Extensions.zip",
    "php84Extensions.gd",
    "php84Extensions.tokenizer",
    "php84Extensions.bcmath",
    "php84Extensions.ctype",
    "php84Extensions.fileinfo",
    "php84Extensions.openssl",
    "php84Extensions.intl",
    "nodejs_22"
]

[phases.install]
cmds = [
    "curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer",
    "composer install --no-dev --optimize-autoloader --no-interaction",
    "npm install",
    "npm run build"
]

[phases.build]
cmds = [
    "php artisan config:cache",
    "php artisan route:cache",
    "php artisan view:cache"
]

[start]
cmd = "php artisan storage:link; php artisan migrate --force; php artisan db:seed --class=AdminSeeder --force; php -S 0.0.0.0:$PORT -t public"
