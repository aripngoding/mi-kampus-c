[build]
builder = "railpack"

[build.railpack]
phpExtensions = ["ctype", "curl", "dom", "fileinfo", "filter", "hash", "mbstring", "openssl", "pcre", "pdo", "pdo_mysql", "session", "tokenizer", "xml", "intl", "zip", "bcmath", "gd"]

[deploy]
startCommand = "php artisan storage:link; php artisan migrate --force; php artisan db:seed --class=AdminSeeder --force; /start-container.sh"
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
